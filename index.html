<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>the quote unquote streamy system</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: monospace;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  background: black;
  z-index: 10;
}

#title {
  font-size: 28px;
  margin-bottom: 10px;
}

#main {
  font-size: 22px;
  opacity: 0.9;
}

#small {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.5;
}

.hidden {
  display: none !important;
}
</style>
</head>

<body>

<video id="vid" playsinline></video>

<div id="overlay">
  <div id="title">loading...</div>
  <div id="main">please wait</div>
  <div id="small">the quote unquote streamy system</div>
</div>

<script>
const params = new URLSearchParams(location.search);

const videoSrc = params.get("video");
const startTime = parseInt(params.get("start") || "0");
const title = params.get("title") || "movie";

const video = document.getElementById("vid");
const overlay = document.getElementById("overlay");
const titleEl = document.getElementById("title");
const mainEl = document.getElementById("main");

video.src = videoSrc;
video.controls = false;
video.autoplay = true;

titleEl.textContent = title;

let duration = 0;
let ended = false;

function now() {
  return Math.floor(Date.now() / 1000);
}

function target() {
  return now() - startTime;
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function showOverlay(t, sub) {
  overlay.classList.remove("hidden");
  mainEl.textContent = t;
  if (sub) titleEl.textContent = sub;
}

function hideOverlay() {
  overlay.classList.add("hidden");
}

/* fullscreen attempt */
document.body.addEventListener("click", () => {
  document.documentElement.requestFullscreen?.();
});

video.addEventListener("loadedmetadata", () => {
  duration = video.duration;
  video.currentTime = clamp(target(), 0, duration);
});

function loop() {
  if (!duration) {
    requestAnimationFrame(loop);
    return;
  }

  const t = target();

  /* BEFORE START */
  if (t < 0) {
    showOverlay("starting soon...", title);
    video.pause();
    requestAnimationFrame(loop);
    return;
  }

  /* AFTER END */
  if (t >= duration) {
    if (!ended) {
      ended = true;
      showOverlay("go home", "thanks for watching");
      video.pause();
    }
    requestAnimationFrame(loop);
    return;
  }

  /* PLAYING */
  hideOverlay();

  if (video.readyState >= 2) {
    const drift = video.currentTime - t;

    /* big correction */
    if (Math.abs(drift) > 2.5) {
      video.currentTime = clamp(t, 0, duration);
      video.playbackRate = 1;
    }
    /* smooth correction */
    else {
      video.playbackRate = Math.max(0.9, Math.min(1.1, 1 - drift * 0.12));
    }

    if (video.paused) video.play().catch(() => {});
  }

  requestAnimationFrame(loop);
}

video.addEventListener("canplay", () => {
  video.play().catch(() => {});
  loop();
});
</script>

</body>
</html>
